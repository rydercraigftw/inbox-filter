<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Inbox Filter">
<title>Inbox Filter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
  
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: 56px 20px 16px; background: #fff; border-bottom: 0.5px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 14px; color: #6e6e73; margin-top: 2px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .badge { font-size: 12px; background: #1c1c1e; color: #fff; padding: 3px 8px; border-radius: 10px; font-weight: 500; margin-top: 4px; }

  /* Sign in */
  #signin-view { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 24px; text-align: center; }
  #signin-view .icon { font-size: 56px; margin-bottom: 24px; }
  #signin-view h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  #signin-view p { font-size: 15px; color: #6e6e73; line-height: 1.5; margin-bottom: 32px; }
  .btn-google { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #dadce0; border-radius: 24px; padding: 12px 24px; font-size: 15px; font-weight: 500; cursor: pointer; color: #1d1d1f; width: 100%; max-width: 300px; justify-content: center; }
  .btn-google:hover { background: #f8f8f8; }
  .btn-google svg { flex-shrink: 0; }

  /* Loading */
  #loading-view { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px; text-align: center; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #1c1c1e; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-view p { font-size: 15px; color: #6e6e73; }

  /* Inbox */
  #inbox-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tabs { display: flex; padding: 12px 20px 0; gap: 0; border-bottom: 0.5px solid #e0e0e0; background: #fff; position: sticky; top: 73px; z-index: 9; }
  .tab { font-size: 14px; font-weight: 500; padding: 8px 16px 10px; cursor: pointer; color: #6e6e73; border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
  .tab.active { color: #1d1d1f; border-bottom-color: #1d1d1f; }
  .email-list { flex: 1; overflow-y: auto; padding-bottom: 32px; }

  /* Email card */
  .email-card { padding: 16px 20px; border-bottom: 0.5px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
  .email-card:active { background: #f5f5f7; }
  .email-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .email-sender { font-size: 15px; font-weight: 600; }
  .email-time { font-size: 12px; color: #8e8e93; }
  .email-subject { font-size: 14px; font-weight: 500; margin-bottom: 2px; color: #1d1d1f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-snippet { font-size: 13px; color: #8e8e93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; flex-shrink: 0; }
  .email-header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  
  .score-pill { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 8px; flex-shrink: 0; }
  .score-high { background: #d1f5da; color: #1a7a30; }
  .score-med { background: #fff3d1; color: #7a5500; }
  .score-low { background: #f5f5f7; color: #8e8e93; }

  /* Email detail */
  #detail-view { display: none; flex-direction: column; flex: 1; }
  .detail-header { padding: 56px 20px 16px; border-bottom: 0.5px solid #e0e0e0; background: #fff; position: sticky; top: 0; z-index: 10; }
  .back-btn { font-size: 15px; color: #0071e3; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 4px; }
  .detail-subject { font-size: 20px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
  .detail-meta { font-size: 13px; color: #6e6e73; }
  .ai-summary { margin: 16px 20px; background: #f0f7ff; border-radius: 12px; padding: 14px 16px; }
  .ai-summary-label { font-size: 11px; font-weight: 600; color: #0071e3; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .ai-summary-text { font-size: 14px; color: #1d1d1f; line-height: 1.5; }
  .detail-body { padding: 16px 20px; font-size: 15px; line-height: 1.6; color: #1d1d1f; flex: 1; overflow-y: auto; }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; padding: 60px 24px; text-align: center; gap: 8px; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
  .empty h3 { font-size: 17px; font-weight: 600; }
  .empty p { font-size: 14px; color: #8e8e93; }

  /* Refresh btn */
  .refresh-btn { font-size: 13px; color: #0071e3; cursor: pointer; border: none; background: none; padding: 0; font-family: inherit; }

  /* Error */
  .error-banner { margin: 16px 20px; background: #fff2f2; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #c00; line-height: 1.4; }
</style>
</head>
<body>
<div id="app">

  <!-- Sign In View -->
  <div id="signin-view">
    <div class="icon">✉️</div>
    <h2>Inbox Filter</h2>
    <p>Sign in with your Gmail account. AI will filter your emails and show you only what matters.</p>
    <button class="btn-google" id="signin-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>
    <p style="font-size:12px;color:#8e8e93;margin-top:20px;max-width:280px;line-height:1.4;">Your emails are only read during your session and never stored.</p>
  </div>

  <!-- Loading View -->
  <div id="loading-view">
    <div class="spinner"></div>
    <p id="loading-text">Fetching your emails…</p>
  </div>

  <!-- Inbox View -->
  <div id="inbox-view">
    <div class="header">
      <div class="header-row">
        <div>
          <h1>Inbox</h1>
          <p id="user-email" style="font-size:13px;color:#8e8e93;"></p>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          <span class="badge" id="count-badge">0 important</span>
          <button class="refresh-btn" id="refresh-btn">Refresh</button>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="important">Important</div>
      <div class="tab" data-tab="all">All emails</div>
    </div>
    <div id="error-container"></div>
    <div class="email-list" id="email-list"></div>
  </div>

  <!-- Detail View -->
  <div id="detail-view">
    <div class="detail-header">
      <div class="back-btn" id="back-btn">&#8592; Back</div>
      <div class="detail-subject" id="detail-subject"></div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
    <div class="ai-summary" id="ai-summary" style="display:none;">
      <div class="ai-summary-label">AI Summary</div>
      <div class="ai-summary-text" id="ai-summary-text"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

</div>

<script src="https://apis.google.com/js/api.js"></script>
<script>
const CLIENT_ID = '583698609672-1u4cs30gu48ugar48mm6jr3d06391toq.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly';

let tokenClient;
let emails = [];
let currentTab = 'important';

function show(id) {
  ['signin-view','loading-view','inbox-view','detail-view'].forEach(v => {
    document.getElementById(v).style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = id === 'signin-view' ? 'flex' : id === 'loading-view' ? 'flex' : 'flex';
  el.style.flexDirection = 'column';
}

function setLoading(text) {
  show('loading-view');
  document.getElementById('loading-text').textContent = text;
}

window.onload = () => {
  gapi.load('client', async () => {
    await gapi.client.init({});
    await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/gmail/v1/rest');

    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: handleTokenResponse,
    });

    document.getElementById('signin-btn').addEventListener('click', () => {
      tokenClient.requestAccessToken({ prompt: 'consent' });
    });

    document.getElementById('refresh-btn').addEventListener('click', loadEmails);
    document.getElementById('back-btn').addEventListener('click', () => show('inbox-view'));

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        renderEmailList();
      });
    });
  });

  if (!window.google) {
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    document.head.appendChild(script);
  }
};

async function handleTokenResponse(resp) {
  if (resp.error) { alert('Sign-in failed: ' + resp.error); return; }
  setLoading('Fetching your emails…');
  try {
    const profile = await gapi.client.gmail.users.getProfile({ userId: 'me' });
    document.getElementById('user-email').textContent = profile.result.emailAddress;
    await loadEmails();
  } catch(e) {
    show('signin-view');
    alert('Could not access Gmail. Please try again.');
  }
}

async function loadEmails() {
  setLoading('Fetching your emails…');
  document.getElementById('error-container').innerHTML = '';
  try {
    const res = await gapi.client.gmail.users.messages.list({
      userId: 'me', maxResults: 20, q: 'in:inbox'
    });
    const messages = res.result.messages || [];
    if (!messages.length) { emails = []; show('inbox-view'); renderEmailList(); return; }

    setLoading('Reading ' + messages.length + ' emails…');
    const fetched = await Promise.all(messages.map(m =>
      gapi.client.gmail.users.messages.get({ userId: 'me', id: m.id, format: 'metadata',
        metadataHeaders: ['Subject','From','Date'] })
    ));

    emails = fetched.map(r => {
      const h = r.result.payload.headers;
      const get = name => (h.find(x => x.name === name) || {}).value || '';
      const from = get('From');
      const nameMatch = from.match(/^"?([^"<]+)"?\s*</);
      return {
        id: r.result.id,
        threadId: r.result.threadId,
        sender: nameMatch ? nameMatch[1].trim() : from.replace(/<.*>/, '').trim() || from,
        senderEmail: (from.match(/<(.+)>/) || [,''])[1],
        subject: get('Subject') || '(no subject)',
        date: get('Date'),
        snippet: r.result.snippet || '',
        score: null,
        summary: null,
      };
    });

    setLoading('AI is filtering your emails…');
    await scoreEmailsWithAI();
    show('inbox-view');
    renderEmailList();
  } catch(e) {
    show('inbox-view');
    document.getElementById('error-container').innerHTML =
      '<div class="error-banner">Could not load emails. ' + (e.message || 'Please try again.') + '</div>';
    renderEmailList();
  }
}

async function scoreEmailsWithAI() {
  const list = emails.map((e, i) =>
    `${i}. From: ${e.sender} <${e.senderEmail}>\nSubject: ${e.subject}\nSnippet: ${e.snippet.slice(0, 120)}`
  ).join('\n\n');

  const prompt = `You are an email importance classifier. Score each email 0-100 for importance to the recipient.

High score (70-100): Personal messages, direct questions, work tasks, bills, shipping notifications, replies from real people, anything requiring action.
Medium score (30-69): Newsletters they may have signed up for, receipts, account notifications.
Low score (0-29): Bulk marketing, promos, automated newsletters, social notifications.

Emails:
${list}

Respond ONLY with a JSON array of objects like: [{"index":0,"score":85,"summary":"Brief one-line reason"}]
No markdown, no explanation, just the JSON array.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const results = JSON.parse(clean);
    results.forEach(r => {
      if (emails[r.index]) {
        emails[r.index].score = r.score;
        emails[r.index].summary = r.summary;
      }
    });
  } catch(e) {
    emails.forEach(em => { em.score = 50; em.summary = null; });
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diff < 604800000) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function scorePill(score) {
  if (score === null) return '';
  if (score >= 70) return `<span class="score-pill score-high">${score}</span>`;
  if (score >= 30) return `<span class="score-pill score-med">${score}</span>`;
  return `<span class="score-pill score-low">${score}</span>`;
}

function renderEmailList() {
  const list = document.getElementById('email-list');
  const filtered = currentTab === 'important'
    ? emails.filter(e => e.score === null || e.score >= 70)
    : emails;

  const important = emails.filter(e => e.score >= 70).length;
  document.getElementById('count-badge').textContent = important + ' important';

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">${currentTab === 'important' ? '🎉' : '📭'}</div><h3>${currentTab === 'important' ? 'All clear!' : 'No emails'}</h3><p>${currentTab === 'important' ? 'No important emails found.' : 'Your inbox is empty.'}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map((e, idx) => `
    <div class="email-card" data-id="${e.id}">
      <div class="email-meta">
        <div class="email-header-left">
          ${e.score >= 70 ? '<div class="priority-dot"></div>' : '<div style="width:8px;flex-shrink:0"></div>'}
          <span class="email-sender">${escHtml(e.sender)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          ${scorePill(e.score)}
          <span class="email-time">${formatDate(e.date)}</span>
        </div>
      </div>
      <div class="email-subject">${escHtml(e.subject)}</div>
      <div class="email-snippet">${e.summary ? escHtml(e.summary) : escHtml(e.snippet)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.email-card').forEach(card => {
    card.addEventListener('click', () => openEmail(card.dataset.id));
  });
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function openEmail(id) {
  const email = emails.find(e => e.id === id);
  if (!email) return;
  show('detail-view');
  document.getElementById('detail-subject').textContent = email.subject;
  document.getElementById('detail-meta').textContent = `From ${email.sender} · ${formatDate(email.date)}`;
  document.getElementById('detail-body').textContent = 'Loading…';

  if (email.summary) {
    document.getElementById('ai-summary').style.display = 'block';
    document.getElementById('ai-summary-text').textContent = email.summary;
  } else {
    document.getElementById('ai-summary').style.display = 'none';
  }

  try {
    const res = await gapi.client.gmail.users.messages.get({
      userId: 'me', id: id, format: 'full'
    });
    const body = extractBody(res.result.payload);
    document.getElementById('detail-body').innerHTML = body || `<span style="color:#8e8e93">${email.snippet}</span>`;
  } catch(e) {
    document.getElementById('detail-body').textContent = email.snippet || 'Could not load email body.';
  }
}

function extractBody(payload) {
  if (!payload) return '';
  const tryDecode = data => {
    try { return atob(data.replace(/-/g,'+').replace(/_/g,'/')); } catch { return ''; }
  };
  if (payload.body?.data) {
    const text = tryDecode(payload.body.data);
    if (payload.mimeType === 'text/html') return sanitizeHtml(text);
    return `<pre style="white-space:pre-wrap;font-family:inherit;font-size:15px">${escHtml(text)}</pre>`;
  }
  if (payload.parts) {
    const html = payload.parts.find(p => p.mimeType === 'text/html');
    if (html?.body?.data) return sanitizeHtml(tryDecode(html.body.data));
    const plain = payload.parts.find(p => p.mimeType === 'text/plain');
    if (plain?.body?.data) return `<pre style="white-space:pre-wrap;font-family:inherit;font-size:15px">${escHtml(tryDecode(plain.body.data))}</pre>`;
    for (const part of payload.parts) {
      const r = extractBody(part);
      if (r) return r;
    }
  }
  return '';
}

function sanitizeHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('script,style,link,meta').forEach(el => el.remove());
  div.querySelectorAll('[style]').forEach(el => el.removeAttribute('style'));
  return div.innerHTML;
}
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
</body>
</html>
