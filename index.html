<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inbox Filter">
<title>Inbox Filter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e8e8f0; min-height: 100vh; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0e0e16; display: flex; flex-direction: column; }
  :root {
    --neon: #00f5a0; --neon-dim: rgba(0,245,160,0.12); --neon-glow: 0 0 14px rgba(0,245,160,0.45);
    --purple: #9b5cff; --purple-dim: rgba(155,92,255,0.12);
    --surface: #15151f; --surface2: #1c1c2a; --border: rgba(255,255,255,0.07); --text-muted: #6b6b80;
  }
  .header { padding: 56px 20px 16px; background: #0e0e16; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .badge { font-size: 12px; background: var(--neon-dim); color: var(--neon); border: 0.5px solid rgba(0,245,160,0.25); padding: 3px 10px; border-radius: 10px; font-weight: 600; margin-top: 4px; }
  #signin-view { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 24px; text-align: center; }
  .app-icon { width: 72px; height: 72px; background: var(--neon-dim); border: 1px solid rgba(0,245,160,0.25); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 32px; }
  #signin-view h2 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  #signin-view > p { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 36px; max-width: 280px; }
  .btn-google { display: flex; align-items: center; gap: 10px; background: transparent; border: 1px solid var(--neon); border-radius: 14px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; color: var(--neon); width: 100%; max-width: 300px; justify-content: center; box-shadow: var(--neon-glow); transition: box-shadow 0.2s, background 0.2s; }
  .btn-google:hover { background: var(--neon-dim); box-shadow: 0 0 22px rgba(0,245,160,0.65); }
  .btn-google:active { transform: scale(0.98); }
  #loading-view { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px; text-align: center; gap: 20px; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--neon); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-view p { font-size: 15px; color: var(--text-muted); }
  #inbox-view { display: none; flex-direction: column; flex: 1; }
  .tabs { display: flex; padding: 12px 20px 0; border-bottom: 0.5px solid var(--border); background: #0e0e16; position: sticky; top: 73px; z-index: 9; }
  .tab { font-size: 14px; font-weight: 500; padding: 8px 16px 10px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.15s; }
  .tab.active { color: var(--neon); border-bottom-color: var(--neon); }
  .email-list { flex: 1; overflow-y: auto; padding-bottom: 32px; }
  .email-card { padding: 16px 20px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .email-card:active { background: var(--surface); }
  .email-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .email-sender { font-size: 15px; font-weight: 600; color: #e8e8f0; }
  .email-time { font-size: 12px; color: var(--text-muted); }
  .email-subject { font-size: 14px; font-weight: 500; margin-bottom: 3px; color: #c8c8d8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-snippet { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .priority-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 6px rgba(0,245,160,0.8); flex-shrink: 0; }
  .email-header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .score-pill { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 8px; flex-shrink: 0; }
  .score-high { background: var(--neon-dim); color: var(--neon); border: 0.5px solid rgba(0,245,160,0.25); }
  .score-med { background: var(--purple-dim); color: var(--purple); border: 0.5px solid rgba(155,92,255,0.25); }
  .score-low { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 0.5px solid var(--border); }
  #detail-view { display: none; flex-direction: column; flex: 1; }
  .detail-header { padding: 56px 20px 16px; border-bottom: 0.5px solid var(--border); background: #0e0e16; position: sticky; top: 0; z-index: 10; }
  .back-btn { font-size: 15px; color: var(--neon); cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 4px; }
  .detail-subject { font-size: 20px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; color: #fff; }
  .detail-meta { font-size: 13px; color: var(--text-muted); }
  .ai-summary { margin: 16px 20px; background: var(--surface); border: 0.5px solid rgba(0,245,160,0.2); border-radius: 14px; padding: 14px 16px; }
  .ai-summary-label { font-size: 11px; font-weight: 700; color: var(--neon); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .ai-summary-text { font-size: 14px; color: #c8c8d8; line-height: 1.5; }
  .detail-body { padding: 16px 20px; font-size: 15px; line-height: 1.6; color: #c8c8d8; flex: 1; overflow-y: auto; }
  .detail-body pre { white-space: pre-wrap; font-family: inherit; font-size: 15px; }
  .detail-body * { color: #c8c8d8 !important; background: transparent !important; }
  .empty { display: flex; flex-direction: column; align-items: center; padding: 60px 24px; text-align: center; gap: 8px; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
  .empty h3 { font-size: 17px; font-weight: 600; color: #fff; }
  .empty p { font-size: 14px; color: var(--text-muted); }
  .refresh-btn { font-size: 13px; color: var(--neon); cursor: pointer; border: none; background: none; padding: 0; font-family: inherit; }
  .error-banner { margin: 16px 20px; background: rgba(255,60,60,0.07); border: 0.5px solid rgba(255,60,60,0.2); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #ff6b6b; line-height: 1.4; }
  .privacy-note { font-size: 12px; color: var(--text-muted); margin-top: 20px; max-width: 260px; line-height: 1.5; }
  .unsub-bar { margin: 0 20px 4px; }
  .unsub-btn { display: flex; align-items: center; gap: 8px; width: 100%; background: transparent; border: 1px solid rgba(255,100,100,0.4); border-radius: 12px; padding: 11px 16px; font-size: 14px; font-weight: 600; color: #ff6b6b; cursor: pointer; box-shadow: 0 0 10px rgba(255,80,80,0.2); transition: background 0.15s, box-shadow 0.15s; font-family: inherit; }
  .unsub-btn:hover { background: rgba(255,80,80,0.07); box-shadow: 0 0 16px rgba(255,80,80,0.35); }
  .unsub-btn:active { transform: scale(0.98); }
  .unsub-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  .unsub-icon { font-size: 15px; }
  .unsub-success { display: flex; align-items: center; gap: 8px; width: 100%; border: 1px solid rgba(0,245,160,0.25); border-radius: 12px; padding: 11px 16px; font-size: 14px; font-weight: 600; color: var(--neon); background: var(--neon-dim); }
  .unsub-none { font-size: 13px; color: var(--text-muted); padding: 2px 0 8px; }
</style>
</head>
<body>
<div id="app">

  <div id="signin-view">
    <div class="app-icon">✉️</div>
    <h2>Inbox Filter</h2>
    <p>AI-powered email filtering. Only see what actually matters.</p>
    <button class="btn-google" id="signin-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>
    <p class="privacy-note">Read-only access. Your emails are never stored.</p>
  </div>

  <div id="loading-view">
    <div class="spinner"></div>
    <p id="loading-text">Fetching your emails…</p>
  </div>

  <div id="inbox-view">
    <div class="header">
      <div class="header-row">
        <div>
          <h1>Inbox</h1>
          <p id="user-email" style="font-size:13px;color:var(--text-muted);margin-top:2px;"></p>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
          <span class="badge" id="count-badge">0 important</span>
          <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="important">Important</div>
      <div class="tab" data-tab="all">All emails</div>
    </div>
    <div id="error-container"></div>
    <div class="email-list" id="email-list"></div>
  </div>

  <div id="detail-view">
    <div class="detail-header">
      <div class="back-btn" id="back-btn">← Back</div>
      <div class="detail-subject" id="detail-subject"></div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
    <div class="ai-summary" id="ai-summary" style="display:none;">
      <div class="ai-summary-label">AI Summary</div>
      <div class="ai-summary-text" id="ai-summary-text"></div>
    </div>
    <div class="unsub-bar" id="unsub-bar" style="display:none;padding-top:12px;"></div>
    <div class="detail-body" id="detail-body"></div>
  </div>

</div>

<script src="https://apis.google.com/js/api.js"></script>
<script>
const CLIENT_ID = '583698609672-1u4cs30gu48ugar48mm6jr3d06391toq.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly';
let tokenClient, emails = [], currentTab = 'important';

function show(id) {
  ['signin-view','loading-view','inbox-view','detail-view'].forEach(v => {
    document.getElementById(v).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
  document.getElementById(id).style.flexDirection = 'column';
}
function setLoading(text) { show('loading-view'); document.getElementById('loading-text').textContent = text; }

window.onload = () => {
  gapi.load('client', async () => {
    await gapi.client.init({});
    await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/gmail/v1/rest');
    tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: handleTokenResponse });
    document.getElementById('signin-btn').addEventListener('click', () => tokenClient.requestAccessToken({ prompt: 'consent' }));
    document.getElementById('refresh-btn').addEventListener('click', loadEmails);
    document.getElementById('back-btn').addEventListener('click', () => show('inbox-view'));
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active'); currentTab = tab.dataset.tab; renderEmailList();
      });
    });
  });
};

async function handleTokenResponse(resp) {
  if (resp.error) { alert('Sign-in failed: ' + resp.error); return; }
  setLoading('Connecting to Gmail…');
  try {
    const profile = await gapi.client.gmail.users.getProfile({ userId: 'me' });
    document.getElementById('user-email').textContent = profile.result.emailAddress;
    await loadEmails();
  } catch(e) { show('signin-view'); alert('Could not access Gmail. Please try again.'); }
}

async function loadEmails() {
  setLoading('Fetching your emails…');
  document.getElementById('error-container').innerHTML = '';
  try {
    const res = await gapi.client.gmail.users.messages.list({ userId: 'me', maxResults: 20, q: 'in:inbox' });
    const messages = res.result.messages || [];
    if (!messages.length) { emails = []; show('inbox-view'); renderEmailList(); return; }
    setLoading('Reading ' + messages.length + ' emails…');
    const fetched = await Promise.all(messages.map(m =>
      gapi.client.gmail.users.messages.get({ userId: 'me', id: m.id, format: 'metadata', metadataHeaders: ['Subject','From','Date'] })
    ));
    emails = fetched.map(r => {
      const h = r.result.payload.headers, get = name => (h.find(x => x.name === name) || {}).value || '';
      const from = get('From'), nameMatch = from.match(/^"?([^"<]+)"?\s*</);
      return { id: r.result.id, threadId: r.result.threadId,
        sender: nameMatch ? nameMatch[1].trim() : from.replace(/<.*>/, '').trim() || from,
        senderEmail: (from.match(/<(.+)>/) || [,''])[1],
        subject: get('Subject') || '(no subject)', date: get('Date'),
        snippet: r.result.snippet || '', score: null, summary: null };
    });
    setLoading('AI is filtering your emails…');
    await scoreEmailsWithAI();
    show('inbox-view'); renderEmailList();
  } catch(e) {
    show('inbox-view');
    document.getElementById('error-container').innerHTML = '<div class="error-banner">Could not load emails. ' + (e.message || 'Please try again.') + '</div>';
    renderEmailList();
  }
}

async function scoreEmailsWithAI() {
  const list = emails.map((e, i) => `${i}. From: ${e.sender} <${e.senderEmail}>\nSubject: ${e.subject}\nSnippet: ${e.snippet.slice(0,120)}`).join('\n\n');
  const prompt = `You are an email importance classifier. Score each email 0-100 for importance.\nHigh (70-100): personal, work tasks, requires action.\nMedium (30-69): newsletters, receipts.\nLow (0-29): marketing, promos.\n\nEmails:\n${list}\n\nRespond ONLY with JSON array: [{"index":0,"score":85,"summary":"one-line reason"}]. No markdown.`;
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('');
    const results = JSON.parse(text.replace(/```json|```/g, '').trim());
    results.forEach(r => { if (emails[r.index]) { emails[r.index].score = r.score; emails[r.index].summary = r.summary; } });
  } catch(e) { emails.forEach(em => { em.score = 50; em.summary = null; }); }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr), now = new Date(), diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diff < 604800000) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function scorePill(score) {
  if (score === null) return '';
  if (score >= 70) return `<span class="score-pill score-high">${score}</span>`;
  if (score >= 30) return `<span class="score-pill score-med">${score}</span>`;
  return `<span class="score-pill score-low">${score}</span>`;
}

function renderEmailList() {
  const list = document.getElementById('email-list');
  const filtered = currentTab === 'important' ? emails.filter(e => (e.score ?? 50) >= 70) : emails;
  document.getElementById('count-badge').textContent = emails.filter(e => (e.score ?? 0) >= 70).length + ' important';
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">${currentTab === 'important' ? '✓' : '📭'}</div><h3>${currentTab === 'important' ? 'All clear!' : 'No emails'}</h3><p>${currentTab === 'important' ? 'No important emails right now.' : 'Your inbox is empty.'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(e => `
    <div class="email-card" data-id="${e.id}">
      <div class="email-meta">
        <div class="email-header-left">
          ${(e.score ?? 50) >= 70 ? '<div class="priority-dot"></div>' : '<div style="width:7px;flex-shrink:0"></div>'}
          <span class="email-sender">${escHtml(e.sender)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">${scorePill(e.score)}<span class="email-time">${formatDate(e.date)}</span></div>
      </div>
      <div class="email-subject">${escHtml(e.subject)}</div>
      <div class="email-snippet">${escHtml(e.summary || e.snippet)}</div>
    </div>`).join('');
  list.querySelectorAll('.email-card').forEach(card => card.addEventListener('click', () => openEmail(card.dataset.id)));
}

function escHtml(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function openEmail(id) {
  const email = emails.find(e => e.id === id);
  if (!email) return;
  show('detail-view');
  document.getElementById('detail-subject').textContent = email.subject;
  document.getElementById('detail-meta').textContent = `From ${email.sender} · ${formatDate(email.date)}`;
  document.getElementById('detail-body').textContent = 'Loading…';
  if (email.summary) { document.getElementById('ai-summary').style.display = 'block'; document.getElementById('ai-summary-text').textContent = email.summary; }
  else { document.getElementById('ai-summary').style.display = 'none'; }
  document.getElementById('unsub-bar').style.display = 'none';
  try {
    const res = await gapi.client.gmail.users.messages.get({ userId: 'me', id, format: 'full' });
    const body = extractBody(res.result.payload);
    document.getElementById('detail-body').innerHTML = body || `<span style="color:var(--text-muted)">${email.snippet}</span>`;
    const unsubLink = findUnsubscribeLink(res.result.payload);
    renderUnsubBar(unsubLink, email.senderEmail);
  } catch(e) { document.getElementById('detail-body').textContent = email.snippet || 'Could not load email body.'; }
}

function extractBody(payload) {
  if (!payload) return '';
  const tryDecode = data => { try { return atob(data.replace(/-/g,'+').replace(/_/g,'/')); } catch { return ''; } };
  if (payload.body?.data) { const t = tryDecode(payload.body.data); return payload.mimeType === 'text/html' ? sanitizeHtml(t) : `<pre>${escHtml(t)}</pre>`; }
  if (payload.parts) {
    const html = payload.parts.find(p => p.mimeType === 'text/html');
    if (html?.body?.data) return sanitizeHtml(tryDecode(html.body.data));
    const plain = payload.parts.find(p => p.mimeType === 'text/plain');
    if (plain?.body?.data) return `<pre>${escHtml(tryDecode(plain.body.data))}</pre>`;
    for (const part of payload.parts) { const r = extractBody(part); if (r) return r; }
  }
  return '';
}

function findUnsubscribeLink(payload) {
  const tryDecode = data => { try { return atob(data.replace(/-/g,'+').replace(/_/g,'/')); } catch { return ''; } };
  const headers = payload.headers || [];
  const listUnsub = headers.find(h => h.name.toLowerCase() === 'list-unsubscribe');
  if (listUnsub) {
    const urlMatch = listUnsub.value.match(/<(https?:[^>]+)>/);
    if (urlMatch) return { type: 'header', url: urlMatch[1] };
    const mailMatch = listUnsub.value.match(/<mailto:([^>]+)>/);
    if (mailMatch) return { type: 'mailto', url: 'mailto:' + mailMatch[1] };
  }
  const searchParts = parts => {
    if (!parts) return null;
    for (const part of parts) {
      if (part.mimeType === 'text/html' && part.body?.data) {
        const html = tryDecode(part.body.data);
        const match = html.match(/href=["']([^"']*unsubscribe[^"']*)['"]/i);
        if (match) return { type: 'body', url: match[1] };
      }
      if (part.parts) { const r = searchParts(part.parts); if (r) return r; }
    }
    return null;
  };
  if (payload.body?.data && payload.mimeType === 'text/html') {
    const html = tryDecode(payload.body.data);
    const match = html.match(/href=["']([^"']*unsubscribe[^"']*)['"]/i);
    if (match) return { type: 'body', url: match[1] };
  }
  return payload.parts ? searchParts(payload.parts) : null;
}

function renderUnsubBar(link, senderEmail) {
  const bar = document.getElementById('unsub-bar');
  bar.style.display = 'block';
  if (!link) {
    bar.innerHTML = `<p class="unsub-none">No unsubscribe link found for this email.</p>`;
    return;
  }
  bar.innerHTML = `<button class="unsub-btn" id="unsub-btn"><span class="unsub-icon">🚫</span> Unsubscribe from this sender</button>`;
  document.getElementById('unsub-btn').addEventListener('click', () => {
    const btn = document.getElementById('unsub-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="unsub-icon">⏳</span> Opening unsubscribe page…';
    setTimeout(() => {
      window.open(link.url, '_blank');
      bar.innerHTML = `<div class="unsub-success"><span>✓</span> Unsubscribe link opened</div>`;
    }, 300);
  });
}

  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('script,style,link,meta').forEach(el => el.remove());
  div.querySelectorAll('[style]').forEach(el => el.removeAttribute('style'));
  return div.innerHTML;
}
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
</body>
</html>
